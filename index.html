<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VigyanLabs | Innovation With Purpose</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #ffffff;
            color: #1f2937;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 40px;
        }

        .logo {
            width: 450px;
            max-width: 90%;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.3rem;
            color: #4b5563;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #6b7280;
            margin-bottom: 40px;
        }

        .coming-soon {
            display: inline-block;
            padding: 14px 32px;
            border: 2px solid #1f2937;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.95rem;
            color: #9ca3af;
        }

        .footer a {
            color: #1f2937;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .tagline {
                font-size: 1rem;
            }

            .description {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Replace with your logo filename -->
    <img src="logo.png" alt="VigyanLabs" class="logo">

    <p class="tagline">Innovation With Purpose</p>

    <p class="description">
        Building intelligent solutions in software engineering,
        quality assurance, automation, artificial intelligence,
        and healthcare technology.
    </p>

    <div class="coming-soon">
        WEBSITE LAUNCHING SOON
    </div>

    <div class="footer">
        Contact: <a href="mailto:hello@vigyanlabs.co.in">hello@vigyanlabs.co.in</a>
    </div>

</div>

</body>
</html>
